<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looi Robot</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --accent: #ff8a4b;
      --ink: #222;
    }
    
    * {
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 10px;
      transition: all 0.3s ease;
    }
    
    .container.fullscreen {
      max-width: 100%;
      padding: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 8px;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    
    .container.fullscreen .header {
      display: none;
    }
    
    h1 {
      margin: 0;
      font-size: 20px;
    }
    
    .face-container {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 160px;
      max-height: 200px;
      position: relative;
      transition: all 0.3s ease;
    }
    
    .container.fullscreen .face-container {
      flex: 1;
      height: 100vh;
      max-height: none;
    }
    
    .face {
      width: 100%;
      max-width: 320px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s ease;
    }
    
    .container.fullscreen .face {
      max-width: 100%;
      height: 100%;
      max-height: 100vh;
    }
    
    .face svg {
      width: 100%;
      height: 100%;
      transition: all 0.3s ease;
    }
    
    /* 移除 SVG 元素的描邊 */
    .face svg circle,
    .face svg ellipse,
    .face svg path {
      stroke: none !important;
    }
    
    .controls-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* 重要：讓 flex 容器可以收縮 */
      transition: all 0.3s ease;
      overflow: hidden;
    }
    
    .container.fullscreen .controls-container {
      display: none;
    }
    
    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* 重要：讓 flex 容器可以收縮 */
      overflow: hidden;
    }
    
    .input-section {
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    
    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    
    .btn.secondary {
      background: #eee;
      color: var(--ink);
    }
    
    textarea {
      width: 100%;
      min-height: 60px;
      max-height: 80px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }
    
    .quick-commands {
      display: flex;
      gap: 6px;
      margin: 8px 0;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    
    .quick-command {
      background: #f0f0f0;
      color: #333;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      border: 1px solid #ddd;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .quick-command:hover {
      background: #e0e0e0;
    }
    
    .action-buttons {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    
    .keywords {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0;
      flex-shrink: 0;
    }
    
    .keyword {
      background: #222;
      color: white;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
    }
    
    .feedback-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    
    .feedback {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      background: #fbfbfd;
      border: 1px solid #eee;
      margin-top: 8px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.4;
      min-height: 80px;
    }
    
    .device-status {
      margin-top: 8px;
      padding: 6px;
      background: #f0f8ff;
      border-radius: 6px;
      font-size: 10px;
      color: #0066cc;
      flex-shrink: 0;
    }
    
    footer {
      margin-top: 8px;
      font-size: 10px;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }
    
    .toggle-controls {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      z-index: 10;
    }
    
    .container.fullscreen .toggle-controls {
      top: 15px;
      right: 15px;
      width: 35px;
      height: 35px;
      font-size: 16px;
    }
    
    /* 臉頰紅暈動畫 */
    @keyframes blush-pulse {
      0%, 100% { 
        opacity: 0.7;
        transform: scale(1);
      }
      25% { 
        opacity: 0.9;
        transform: scale(1.05) translateX(-1px);
      }
      50% { 
        opacity: 0.8;
        transform: scale(1.02) translateX(1px);
      }
      75% { 
        opacity: 0.9;
        transform: scale(1.05) translateX(1px);
      }
    }
    
    @keyframes blush-sway {
      0%, 100% { 
        transform: translateX(0);
        opacity: 0.7;
      }
      33% { 
        transform: translateX(-2px);
        opacity: 0.9;
      }
      66% { 
        transform: translateX(2px);
        opacity: 0.9;
      }
    }
    
    .blush-animation {
      animation: blush-sway 1.5s ease-in-out;
    }
    
    .blush-pulse-animation {
      animation: blush-pulse 2s ease-in-out;
    }
    
    /* 響應式設計 - 5吋手機優化 */
    @media (max-width: 360px) and (max-height: 640px) {
      .container {
        padding: 5px;
        height: 100vh;
      }
      
      .header {
        margin-bottom: 5px;
      }
      
      h1 {
        font-size: 18px;
      }
      
      .face-container {
        min-height: 140px;
        max-height: 160px;
      }
      
      .face {
        max-width: 280px;
        height: 140px;
      }
      
      .card {
        padding: 8px;
      }
      
      .btn {
        padding: 5px 8px;
        font-size: 11px;
      }
      
      textarea {
        min-height: 50px;
        max-height: 70px;
        font-size: 13px;
        padding: 6px;
      }
      
      .quick-command {
        padding: 3px 6px;
        font-size: 10px;
      }
      
      .feedback {
        padding: 8px;
        font-size: 13px;
        min-height: 70px;
      }
      
      .toggle-controls {
        width: 22px;
        height: 22px;
        font-size: 10px;
      }
    }
    
    /* 橫向模式優化 */
    @media (max-height: 400px) {
      .face-container {
        min-height: 120px;
        max-height: 140px;
      }
      
      .face {
        max-width: 240px;
        height: 120px;
      }
      
      .feedback {
        min-height: 60px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Looi Robot</h1>
    </div>
    
    <div class="face-container">
      <div class="toggle-controls" id="toggleControls">▼</div>
      
      <div class="face card">
        <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- 柔化濾鏡 -->
            <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2" result="b"/>
              <feBlend in="SourceGraphic" in2="b" mode="normal"/>
            </filter>
          </defs>
          
          <!-- 臉部背景 -->
          <rect x="0" y="0" width="320" height="200" rx="18" fill="#fff" stroke="#f0f0f0" />
          
          <!-- 眉毛 -->
          <path d="M60 52 q40 -22 80 0" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M200 52 q40 -22 80 0" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
          
          <!-- 左眼 -->
          <g id="left-eye">
            <circle cx="95" cy="110" r="32" fill="#fff" stroke="#222" stroke-width="2" />
            <circle id="lpupil" cx="95" cy="110" r="14" fill="#111" />
            <!-- 瞳孔內的裝飾條 -->
            <g transform="translate(85,100) scale(.5)" fill="#111">
              <rect x="4" y="10" width="4" height="12" rx="1" />
              <rect x="10" y="6" width="4" height="16" rx="1" />
              <rect x="16" y="2" width="4" height="20" rx="1" />
            </g>
          </g>
          
          <!-- 右眼 -->
          <g id="right-eye">
            <circle cx="225" cy="110" r="32" fill="#fff" stroke="#222" stroke-width="2" />
            <circle id="rpupil" cx="225" cy="110" r="14" fill="#111" />
            <!-- 瞳孔內的裝飾條 -->
            <g transform="translate(215,100) scale(.5)" fill="#111">
              <rect x="4" y="10" width="4" height="12" rx="1" />
              <rect x="10" y="6" width="4" height="16" rx="1" />
              <rect x="16" y="2" width="4" height="20" rx="1" />
            </g>
          </g>
          
          <!-- 臉頰 - 左側 -->
          <ellipse id="left-blush" cx="40" cy="132" rx="24" ry="14" fill="#ff8a4b" opacity="0.7" />
          
          <!-- 臉頰 - 右側 -->
          <ellipse id="right-blush" cx="280" cy="132" rx="24" ry="14" fill="#ff8a4b" opacity="0.7" />
        </svg>
      </div>
    </div>
    
    <div class="controls-container">
      <div class="card">
        <div class="input-section">
          <div class="input-header">
            <strong>輸入訊息（語音或文字）</strong>
            <div>
              <button id="recBtn" class="btn">🎙️ 語音</button>
              <button id="stopRecBtn" class="btn secondary">■ 停止</button>
            </div>
          </div>
          
          <textarea id="textIn" placeholder="輸入你想問 Looi 的話..."></textarea>
          
          <div class="quick-commands">
            <div class="quick-command" data-command="time">現在幾點？</div>
            <div class="quick-command" data-command="greeting">您好</div>
            <div class="quick-command" data-command="introduction">介紹一下</div>
            <div class="quick-command" data-command="chatgpt">問問 GPT</div>
          </div>
          
          <div class="action-buttons">
            <button id="sendBtn" class="btn">送出</button>
            <button id="speakBtn" class="btn secondary">🔊 播放</button>
            <div style="flex: 1; text-align: right;" class="meta">
              語音：<span id="recStatus">未啟動</span>
            </div>
          </div>
          
          <div class="keywords" id="keywords"></div>
        </div>
        
        <div class="feedback-container">
          <div class="feedback" id="robotReply">機器人等待使用者輸入...</div>
        </div>
        
        <div class="device-status" id="deviceStatus">
          設備方向: <span id="orientationStatus">等待檢測</span>
        </div>
        
        <footer>
          注意：語音辨識需在支援的瀏覽器與安全來源下執行
        </footer>
      </div>
    </div>
  </div>

  <script>
    // --- 關鍵字提取功能 ---
    function extractKeywords(text, max=3) {
      if(!text) return [];
      
      text = text.toLowerCase();
      text = text.replace(/[\u2000-\u206F\u2E00-\u2E7F\'"\“\”\‘\’\(\)\[\]\{\},\.\?\!\:\;\-\/\\]/g,' ');
      
      const tokens = text.split(/\s+/).filter(Boolean);
      const stopwords = new Set(["的","了","是","我","你","他","她","在","有","沒","沒有","和","或","也","要","可以","幫","請","嗎","呢","很","就","跟","給","都","還","及","與","為","到","要不要","要是","今天","明天","請問"]);
      
      const counts = {};
      tokens.forEach(t => {
        if(t.length <= 1) return;
        if(stopwords.has(t)) return;
        counts[t] = (counts[t] || 0) + 1;
      });
      
      const arr = Object.keys(counts).map(k => ({k, count: counts[k]})).sort((a, b) => b.count - a.count);
      return arr.slice(0, max).map(x => x.k);
    }

    // --- 檢查是否為 ChatGPT 相關查詢 ---
    function isChatGPTQuery(text) {
      if (!text) return false;
      
      const chatgptKeywords = ['gpt', 'chatgpt', 'openai', '問問', '問問ai', 'ai', '人工智慧', '智能助手', '聊天機器人'];
      const lowerText = text.toLowerCase();
      
      return chatgptKeywords.some(keyword => lowerText.includes(keyword));
    }

    // --- UI 元素引用 ---
    const textIn = document.getElementById('textIn');
    const sendBtn = document.getElementById('sendBtn');
    const keywordsEl = document.getElementById('keywords');
    const robotReply = document.getElementById('robotReply');
    const speakBtn = document.getElementById('speakBtn');
    const recBtn = document.getElementById('recBtn');
    const stopRecBtn = document.getElementById('stopRecBtn');
    const recStatus = document.getElementById('recStatus');
    const orientationStatus = document.getElementById('orientationStatus');
    const toggleControls = document.getElementById('toggleControls');
    const controlsContainer = document.querySelector('.controls-container');
    const faceContainer = document.querySelector('.face-container');
    const container = document.querySelector('.container');
    const leftBlush = document.getElementById('left-blush');
    const rightBlush = document.getElementById('right-blush');

    // --- 快速指令處理 ---
    const quickCommands = document.querySelectorAll('.quick-command');
    quickCommands.forEach(button => {
      button.addEventListener('click', () => {
        const command = button.dataset.command;
        handleQuickCommand(command);
      });
    });

    function handleQuickCommand(command) {
      let reply = '';
      
      switch(command) {
        case 'time':
          const now = new Date();
          const timeString = now.toLocaleTimeString('zh-TW', { 
            hour: '2-digit', 
            minute: '2-digit',
            second: '2-digit'
          });
          reply = `現在時間是 ${timeString}`;
          break;
          
        case 'greeting':
          const hour = new Date().getHours();
          let greeting = '';
          
          if (hour >= 5 && hour < 12) {
            greeting = '早安';
          } else if (hour >= 12 && hour < 18) {
            greeting = '午安';
          } else {
            greeting = '晚安';
          }
          
          reply = `${greeting}！我是您的助理，很高興為您服務。`;
          break;
          
        case 'introduction':
          reply = '我是一個智能助手。我可以幫您搜索信息、報時、回答問題，並通過語音與您互動。請告訴我您需要什麼幫助！';
          break;
          
        case 'chatgpt':
          reply = '我注意到您想使用 ChatGPT。請在輸入框中輸入您的問題，我會幫您開啟 ChatGPT 來回答。';
          textIn.placeholder = '請輸入您想問 ChatGPT 的問題...';
          break;
      }
      
      robotReply.textContent = reply;
      robotReply.dataset.text = reply;
      
      // 觸發臉頰動畫
      triggerBlushAnimation();
      speakText(reply);
    }

    // --- 臉頰紅暈動畫功能 ---
    function triggerBlushAnimation() {
      // 移除之前的動畫類
      leftBlush.classList.remove('blush-animation', 'blush-pulse-animation');
      rightBlush.classList.remove('blush-animation', 'blush-pulse-animation');
      
      // 觸發重新渲染
      void leftBlush.offsetWidth;
      void rightBlush.offsetWidth;
      
      // 隨機選擇一種臉頰動畫
      const animations = ['blush-animation', 'blush-pulse-animation'];
      const randomAnimation = animations[Math.floor(Math.random() * animations.length)];
      
      // 添加動畫類
      leftBlush.classList.add(randomAnimation);
      rightBlush.classList.add(randomAnimation);
      
      // 動畫結束後移除類
      setTimeout(() => {
        leftBlush.classList.remove(randomAnimation);
        rightBlush.classList.remove(randomAnimation);
      }, 2000);
    }

    // --- 事件監聽器 ---
    sendBtn.addEventListener('click', () => {
      handleSend(textIn.value);
      // 觸發臉頰動畫
      triggerBlushAnimation();
    });

    speakBtn.addEventListener('click', () => {
      const txt = robotReply.dataset.text || robotReply.textContent;
      speakText(txt);
      // 觸發臉頰動畫
      triggerBlushAnimation();
    });

    // 控制面板摺疊功能
    let isFullscreen = false;
    toggleControls.addEventListener('click', () => {
      isFullscreen = !isFullscreen;
      
      if (isFullscreen) {
        container.classList.add('fullscreen');
        toggleControls.textContent = '▲';
      } else {
        container.classList.remove('fullscreen');
        toggleControls.textContent = '▼';
      }
    });

    function updateKeywordsView(keys) {
      keywordsEl.innerHTML = '';
      if(keys.length === 0) return;
      
      keys.forEach(k => {
        const b = document.createElement('div'); 
        b.className = 'keyword'; 
        b.textContent = k; 
        keywordsEl.appendChild(b);
      });
    }

    function handleSend(raw) {
      raw = (raw || '').trim();
      
      if(!raw) {
        robotReply.textContent = '請先輸入或用語音輸入一段文字。'; 
        return;
      }
      
      // 檢查是否為特殊指令
      if (raw.includes('現在幾點') || raw.includes('報時') || raw.includes('時間')) {
        handleQuickCommand('time');
        return;
      } else if (raw.includes('你好') || raw.includes('您好') || raw.includes('嗨')) {
        handleQuickCommand('greeting');
        return;
      } else if (raw.includes('介紹') || raw.includes('你是誰') || raw.includes('功能')) {
        handleQuickCommand('introduction');
        return;
      }
      
      // 檢查是否為 ChatGPT 相關查詢
      if (isChatGPTQuery(raw)) {
        robotReply.textContent = '偵測到 ChatGPT 相關查詢，正在為您開啟 ChatGPT...';
        
        // 開啟 ChatGPT
        const chatGPTUrl = 'https://chat.openai.com/?q=' + encodeURIComponent(raw);
        
        setTimeout(() => {
          window.open(chatGPTUrl, '_blank');
          speakText('幫您聯絡GPT了，請在新分頁中點選送出，並查閱它的回應');
        }, 1000);
        
        return;
      }
      
      robotReply.textContent = '分析中…';
      
      const keys = extractKeywords(raw, 4);
      updateKeywordsView(keys);
      
      const query = keys.length ? keys.join(' ') : raw.split('\n').slice(0,6).join(' ');
      const reply = `我聽到您說：${keys.length ? keys.join(', ') : '(無)'}。這是GOOGLE找到的結果：${query}`;
      
      robotReply.textContent = reply; 
      robotReply.dataset.text = reply;
      
      // 觸發臉頰動畫
      triggerBlushAnimation();
      speakText(reply);
      
      const url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
      
      setTimeout(() => {
        window.open(url, '_blank');
      }, 650);
    }

    // --- 語音合成功能 ---
    function speakText(text) {
      if(!('speechSynthesis' in window)) return;
      
      window.speechSynthesis.cancel();
      
      const u = new SpeechSynthesisUtterance(text);
      const voices = window.speechSynthesis.getVoices();
      const zh = voices.find(v => /zh|taiwan|mandarin/i.test(v.lang));
      if(zh) u.voice = zh;
      
      u.rate = 1; 
      u.pitch = 1;
      window.speechSynthesis.speak(u);
    }

    // --- 眼球跟隨鼠標動畫 ---
    const lpupil = document.getElementById('lpupil');
    const rpupil = document.getElementById('rpupil');
    
    let faceRect = {x:0, y:0, w:320, h:200};
    
    function updateFaceRect() {
      const svg = document.querySelector('.face svg');
      const r = svg.getBoundingClientRect();
      faceRect = {x:r.left, y:r.top, w:r.width, h:r.height};
    }
    
    updateFaceRect(); 
    window.addEventListener('resize', updateFaceRect);
    
    document.addEventListener('mousemove', e => {
      const cx = e.clientX, cy = e.clientY;
      
      const left = {x:95, y:110};
      const right = {x:225, y:110};
      
      const mapPupil = (center) => {
        const svg = document.querySelector('.face svg');
        const scaleX = faceRect.w / 320; 
        const scaleY = faceRect.h / 200;
        
        const px = center.x * scaleX + faceRect.x;
        const py = center.y * scaleY + faceRect.y;
        
        const dx = (cx - px); 
        const dy = (cy - py);
        const max = 8;
        
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = (len ? dx / len : 0) * Math.min(max, len);
        const ny = (len ? dy / len : 0) * Math.min(max, len);
        
        return {nx, ny};
      }
      
      const l = mapPupil(left);
      const r = mapPupil(right);
      
      lpupil.setAttribute('cx', 95 + (l.nx / faceRect.w * 40));
      lpupil.setAttribute('cy', 110 + (l.ny / faceRect.h * 40));
      rpupil.setAttribute('cx', 225 + (r.nx / faceRect.w * 40));
      rpupil.setAttribute('cy', 110 + (r.ny / faceRect.h * 40));
    });

    // --- 設備方向檢測 (手機水平旋轉) ---
    let isDeviceOrientationSupported = false;
    let lastGamma = 0;
    let lastBeta = 0;

    function updatePupilsByOrientation(gamma, beta) {
      // gamma: 左右傾斜 (-90 到 90)
      // beta: 前後傾斜 (-180 到 180)
      
      // 限制gamma值範圍
      gamma = Math.max(-90, Math.min(90, gamma));
      
      // 計算眼球水平偏移量
      const maxHorizontalOffset = 10;
      const horizontalOffset = (gamma / 90) * maxHorizontalOffset;
      
      // 計算眼球垂直偏移量
      const maxVerticalOffset = 6;
      let verticalOffset = 0;
      
      // 根據前後傾斜調整垂直位置
      if (beta > 45) {
        // 手機向前傾斜（螢幕朝下）
        verticalOffset = maxVerticalOffset;
      } else if (beta < -45) {
        // 手機向後傾斜（螢幕朝上）
        verticalOffset = -maxVerticalOffset;
      }
      
      // 更新眼球位置
      lpupil.setAttribute('cx', 95 - horizontalOffset);
      lpupil.setAttribute('cy', 110 + verticalOffset);
      rpupil.setAttribute('cx', 225 - horizontalOffset);
      rpupil.setAttribute('cy', 110 + verticalOffset);
      
      // 更新狀態顯示
      orientationStatus.textContent = `水平: ${gamma.toFixed(1)}° | 垂直: ${beta.toFixed(1)}°`;
    }

    // 檢查設備是否支援方向檢測
    if (window.DeviceOrientationEvent) {
      isDeviceOrientationSupported = true;
      orientationStatus.textContent = '設備方向檢測已啟用';
      
      window.addEventListener('deviceorientation', (event) => {
        if (event.gamma !== null && event.beta !== null) {
          lastGamma = event.gamma;
          lastBeta = event.beta;
          updatePupilsByOrientation(event.gamma, event.beta);
        }
      });
    } else {
      orientationStatus.textContent = '此設備不支援方向檢測';
    }

    // --- 語音辨識功能 ---
    let recognition = null;
    let recognizing = false;

    if(window.SpeechRecognition || window.webkitSpeechRecognition) {
      const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new Rec();
      
      recognition.lang = 'zh-TW';
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        recognizing = true; 
        recStatus.textContent = '聆聽中…';
        // 語音辨識開始時觸發臉頰動畫
        triggerBlushAnimation();
      };
      
      recognition.onend = () => {
        recognizing = false; 
        recStatus.textContent = '已停止';
      };
      
      recognition.onerror = (e) => {
        console.warn('rec error', e); 
        recStatus.textContent = '辨識發生錯誤';
      };
      
      let finalTranscript = '';
      recognition.onresult = (ev) => {
        let interim = '';
        
        for(let i = ev.resultIndex; i < ev.results.length; i++) {
          const r = ev.results[i];
          if(r.isFinal) 
            finalTranscript += r[0].transcript;
          else 
            interim += r[0].transcript;
        }
        
        textIn.value = (finalTranscript + interim).trim();
        
        // 語音辨識過程中隨機觸發臉頰動畫
        if (Math.random() > 0.7) {
          triggerBlushAnimation();
        }
      };
    } else {
      recStatus.textContent = '此裝置不支援語音辨識。';
      recBtn.disabled = true; 
      stopRecBtn.disabled = true;
    }

    recBtn.addEventListener('click', () => {
      if(!recognition) return;
      try { 
        finalReset(); 
        recognition.start(); 
      } catch(e) {
        console.warn(e);
      }
    });

    stopRecBtn.addEventListener('click', () => {
      if(!recognition) return;
      recognition.stop();
    });

    function finalReset() {
      recStatus.textContent = '準備中…請開始說話';
    }

    // --- 鍵盤快捷鍵 ---
    textIn.addEventListener('keydown', e => {
      if(e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault(); 
        handleSend(textIn.value);
      }
    });

    // --- 無障礙功能 ---
    (function announceOpenHook() {
      const orig = window.open;
      window.open = function(url, name, features) {
        const msg = `已為您開啟搜尋結果頁面。`;
        speakText(msg);
        return orig.call(window, url, name, features);
      };
    })();

    // 定期臉頰動畫
    setInterval(() => {
      if (!leftBlush.classList.contains('blush-animation') && 
          !leftBlush.classList.contains('blush-pulse-animation')) {
        triggerBlushAnimation();
      }
    }, 8000);
  </script>
</body>
</html>
